<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Research</title>
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0c0c0c;
      --surface: #141414;
      --surface-2: #1a1a1a;
      --border: #222;
      --text: #d4d4d4;
      --text-dim: #777;
      --text-bright: #f0f0f0;
      --accent: #6e8cfa;
      --accent-dim: rgba(110,140,250,0.1);
      --radius: 10px;
      --content-width: 680px;
      --sidebar-width: 260px;
    }

    html { height: 100%; -webkit-text-size-adjust: 100%; }
    body {
      height: 100%;
      font-family: -apple-system, BlinkMacSystemFont, 'Inter', 'Segoe UI', sans-serif;
      background: var(--bg);
      color: var(--text);
      display: flex;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
    }

    /* ── Sidebar ── */
    .sidebar {
      width: var(--sidebar-width);
      min-width: var(--sidebar-width);
      background: var(--surface);
      border-right: 1px solid var(--border);
      overflow-y: auto;
      display: flex;
      flex-direction: column;
      z-index: 10;
    }

    .sidebar-header {
      padding: 20px 18px 16px;
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
    }
    .sidebar-header h1 {
      font-size: 0.95rem;
      font-weight: 700;
      color: var(--text-bright);
      letter-spacing: -0.01em;
    }
    .sidebar-header p {
      font-size: 0.72rem;
      color: var(--text-dim);
      margin-top: 2px;
    }

    .sidebar-nav {
      flex: 1;
      overflow-y: auto;
      padding: 8px 0 20px;
    }

    .folder-label {
      padding: 10px 18px 4px;
      font-size: 0.65rem;
      font-weight: 700;
      color: var(--text-dim);
      letter-spacing: 0.1em;
      text-transform: uppercase;
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: 6px;
      user-select: none;
      transition: color 0.15s;
    }
    .folder-label:hover { color: var(--text); }
    .folder-label .arrow {
      font-size: 0.5rem;
      transition: transform 0.2s;
    }
    .folder.open .arrow { transform: rotate(90deg); }

    .file-list { display: none; padding: 4px 0 8px; }
    .folder.open .file-list { display: block; }

    .file-item {
      padding: 7px 18px 7px 28px;
      font-size: 0.78rem;
      color: var(--text-dim);
      cursor: pointer;
      line-height: 1.4;
      transition: all 0.12s;
      border-left: 2px solid transparent;
    }
    .file-item:hover {
      color: var(--text);
      background: rgba(255,255,255,0.03);
    }
    .file-item.active {
      color: var(--accent);
      background: var(--accent-dim);
      border-left-color: var(--accent);
    }

    /* ── Mobile menu toggle ── */
    .menu-toggle {
      display: none;
      position: fixed;
      bottom: 20px;
      right: 20px;
      z-index: 100;
      width: 48px;
      height: 48px;
      border-radius: 50%;
      border: 1px solid var(--border);
      background: var(--surface-2);
      color: var(--text);
      font-size: 1.2rem;
      cursor: pointer;
      box-shadow: 0 4px 20px rgba(0,0,0,0.5);
      align-items: center;
      justify-content: center;
    }

    .mobile-overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.6);
      z-index: 9;
    }

    /* ── Main ── */
    .main {
      flex: 1;
      overflow-y: auto;
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    .empty-state {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100%;
      color: var(--text-dim);
      gap: 10px;
      font-size: 0.85rem;
      padding: 20px;
      text-align: center;
    }

    /* ── Article ── */
    .article {
      display: none;
      width: 100%;
      max-width: var(--content-width);
      padding: 48px 24px 120px;
      font-size: 1rem;
      line-height: 1.85;
    }

    .article h1 {
      font-size: 2rem;
      font-weight: 800;
      color: var(--text-bright);
      line-height: 1.2;
      margin-bottom: 8px;
      letter-spacing: -0.03em;
    }
    .article h2 {
      font-size: 1.35rem;
      font-weight: 700;
      color: var(--text-bright);
      margin: 40px 0 12px;
      letter-spacing: -0.02em;
      padding-bottom: 8px;
      border-bottom: 1px solid var(--border);
    }
    .article h3 {
      font-size: 1.1rem;
      font-weight: 600;
      color: var(--text-bright);
      margin: 28px 0 8px;
    }
    .article h4 {
      font-size: 0.95rem;
      font-weight: 600;
      color: var(--text);
      margin: 20px 0 6px;
    }
    .article p {
      font-size: 0.94rem;
      line-height: 1.85;
      margin-bottom: 16px;
      color: #aaa;
    }
    .article ul, .article ol {
      margin: 8px 0 16px 22px;
    }
    .article li {
      font-size: 0.94rem;
      color: #aaa;
      margin-bottom: 6px;
      line-height: 1.75;
    }
    .article li::marker { color: var(--text-dim); }
    .article a {
      color: var(--accent);
      text-decoration: none;
      border-bottom: 1px solid transparent;
      transition: border-color 0.15s;
    }
    .article a:hover { border-bottom-color: var(--accent); }
    .article strong { color: var(--text-bright); font-weight: 600; }
    .article em { color: #bbb; }
    .article hr {
      border: none;
      border-top: 1px solid var(--border);
      margin: 32px 0;
    }
    .article blockquote {
      border-left: 3px solid var(--accent);
      padding: 12px 18px;
      margin: 18px 0;
      background: var(--accent-dim);
      border-radius: 0 var(--radius) var(--radius) 0;
    }
    .article blockquote p { color: var(--text-dim); margin-bottom: 0; }
    .article code {
      background: var(--surface-2);
      padding: 2px 7px;
      border-radius: 5px;
      font-size: 0.84em;
      font-family: 'SF Mono', 'Fira Code', 'Cascadia Code', monospace;
      color: #d4956a;
    }
    .article pre {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 18px 20px;
      overflow-x: auto;
      margin: 18px 0;
    }
    .article pre code {
      background: none;
      padding: 0;
      color: var(--text);
      font-size: 0.84em;
      line-height: 1.6;
    }
    .article img {
      max-width: 100%;
      height: auto;
      border-radius: var(--radius);
      margin: 16px 0;
    }

    /* ── Tables: break out of content width ── */
    .table-wrap {
      width: calc(100vw - var(--sidebar-width) - 40px);
      max-width: 1100px;
      margin-left: 50%;
      transform: translateX(-50%);
      overflow-x: auto;
      margin-top: 18px;
      margin-bottom: 18px;
      border: 1px solid var(--border);
      border-radius: var(--radius);
      background: var(--surface);
      -webkit-overflow-scrolling: touch;
    }
    .article table {
      width: 100%;
      border-collapse: collapse;
      font-size: 0.84rem;
      line-height: 1.5;
    }
    .article th {
      background: var(--surface-2);
      padding: 10px 14px;
      text-align: left;
      font-weight: 600;
      color: var(--text-bright);
      white-space: nowrap;
      border-bottom: 1px solid var(--border);
    }
    .article td {
      padding: 10px 14px;
      color: #aaa;
      border-bottom: 1px solid var(--border);
      vertical-align: top;
    }
    .article tr:last-child td { border-bottom: none; }
    .article tr:hover td { background: rgba(255,255,255,0.02); }

    /* ── Responsive: Tablet ── */
    @media (max-width: 960px) {
      :root { --content-width: 600px; }
      .table-wrap {
        width: calc(100vw - var(--sidebar-width) - 24px);
      }
    }

    /* ── Responsive: Mobile ── */
    @media (max-width: 700px) {
      :root { --sidebar-width: 280px; }

      .sidebar {
        position: fixed;
        top: 0;
        left: 0;
        bottom: 0;
        transform: translateX(-100%);
        transition: transform 0.25s ease;
        box-shadow: 4px 0 24px rgba(0,0,0,0.4);
      }
      .sidebar.open {
        transform: translateX(0);
      }

      .menu-toggle { display: flex; }
      .mobile-overlay.visible { display: block; }

      .article {
        padding: 28px 18px 100px;
        font-size: 0.95rem;
      }
      .article h1 { font-size: 1.55rem; }
      .article h2 { font-size: 1.15rem; }

      .table-wrap {
        width: calc(100vw - 36px);
        max-width: none;
      }
    }

    /* ── Responsive: Large desktop ── */
    @media (min-width: 1400px) {
      :root {
        --content-width: 760px;
        --sidebar-width: 280px;
      }
      .article { padding: 56px 32px 120px; }
      .article h1 { font-size: 2.2rem; }
      .article p, .article li { font-size: 1rem; line-height: 1.9; }
      .table-wrap {
        max-width: 1200px;
      }
    }

    /* ── Responsive: Ultra wide ── */
    @media (min-width: 1800px) {
      :root {
        --content-width: 800px;
        --sidebar-width: 300px;
      }
      .article p, .article li { font-size: 1.02rem; }
      .table-wrap { max-width: 1400px; }
    }

    /* Scrollbar */
    ::-webkit-scrollbar { width: 6px; height: 6px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: #333; border-radius: 3px; }
    ::-webkit-scrollbar-thumb:hover { background: #444; }
  </style>
</head>
<body>

<div class="mobile-overlay" id="overlay" onclick="closeSidebar()"></div>

<aside class="sidebar" id="sidebar">
  <div class="sidebar-header">
    <h1>Research</h1>
    <p>Aarone George</p>
  </div>
  <div class="sidebar-nav" id="nav"></div>
</aside>

<button class="menu-toggle" id="menuBtn" onclick="toggleSidebar()" aria-label="Toggle menu">
  <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/></svg>
</button>

<main class="main" id="main">
  <div class="empty-state" id="empty">
    <svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.2" style="opacity:0.25">
      <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/>
      <line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/>
    </svg>
    <span>Select a document from the sidebar</span>
  </div>
  <div class="article" id="article"></div>
</main>

<script>
  const REPO_OWNER = 'AaroneGeorge';
  const REPO_NAME = 'Research';
  const BRANCH = 'main';
  const IGNORE = ['README.md', 'CLAUDE.md', 'MEMORY.md'];

  const nav = document.getElementById('nav');
  let activeItem = null;
  let fileItemMap = {}; // path -> DOM element

  async function discoverDocs() {
    nav.innerHTML = '<div style="padding:18px;color:var(--text-dim);font-size:0.78rem">Loading docs...</div>';

    try {
      const res = await fetch(`https://api.github.com/repos/${REPO_OWNER}/${REPO_NAME}/git/trees/${BRANCH}?recursive=1`);
      if (!res.ok) throw new Error(res.statusText);
      const data = await res.json();

      // Filter for .md files inside folders (not root-level)
      const mdFiles = data.tree
        .filter(f => f.type === 'blob' && f.path.endsWith('.md') && f.path.includes('/'))
        .filter(f => !IGNORE.some(ig => f.path.endsWith('/' + ig) || f.path === ig))
        .map(f => f.path);

      // Group by top-level folder
      const folders = {};
      mdFiles.forEach(p => {
        const topFolder = p.split('/')[0];
        if (!folders[topFolder]) folders[topFolder] = [];
        folders[topFolder].push(p);
      });

      nav.innerHTML = '';
      buildSidebar(folders);
    } catch (e) {
      console.error('GitHub API failed, using fallback', e);
      nav.innerHTML = '<div style="padding:18px;color:#f87171;font-size:0.78rem">Failed to load docs: ' + e.message + '</div>';
    }
  }

  function prettyName(filePath) {
    const filename = filePath.split('/').pop().replace(/\.md$/, '');
    return filename
      .replace(/[-_]/g, ' ')
      .replace(/\b\w/g, c => c.toUpperCase());
  }

  function buildSidebar(folders) {
    fileItemMap = {};
    for (const [folder, files] of Object.entries(folders)) {
      const div = document.createElement('div');
      div.className = 'folder open';

      const label = document.createElement('div');
      label.className = 'folder-label';
      label.innerHTML = `<span class="arrow">&#9654;</span> ${folder.replace(/[-_]/g, ' ')}`;
      label.onclick = () => div.classList.toggle('open');

      const list = document.createElement('div');
      list.className = 'file-list';

      files.forEach(filePath => {
        const item = document.createElement('div');
        item.className = 'file-item';
        item.textContent = prettyName(filePath);
        item.onclick = () => {
          window.location.hash = '/' + filePath;
          closeSidebar();
        };
        list.appendChild(item);
        fileItemMap[filePath] = item;
      });

      div.appendChild(label);
      div.appendChild(list);
      nav.appendChild(div);
    }
  }

  async function loadFile(path) {
    // Update active sidebar item
    if (activeItem) activeItem.classList.remove('active');
    const el = fileItemMap[path];
    if (el) {
      activeItem = el;
      el.classList.add('active');
    }

    const article = document.getElementById('article');
    const empty = document.getElementById('empty');

    empty.style.display = 'none';
    article.style.display = 'block';
    article.innerHTML = '<p style="color:var(--text-dim)">Loading...</p>';

    try {
      const res = await fetch(path);
      if (!res.ok) throw new Error(res.statusText);
      const md = await res.text();
      article.innerHTML = marked.parse(md);
      wrapTables();
      document.getElementById('main').scrollTo(0, 0);
    } catch (e) {
      article.innerHTML = `<p style="color:#f87171">Failed to load: ${e.message}</p>`;
    }
  }

  // Route based on hash: #/folder_name/doc_name.md
  function handleRoute() {
    const hash = window.location.hash;
    if (hash && hash.startsWith('#/')) {
      const path = hash.slice(2); // remove #/
      loadFile(path);
    } else {
      // Show empty state
      document.getElementById('empty').style.display = 'flex';
      document.getElementById('article').style.display = 'none';
      if (activeItem) activeItem.classList.remove('active');
      activeItem = null;
    }
  }

  window.addEventListener('hashchange', handleRoute);

  // Wrap tables in scrollable containers that can break out of content width
  function wrapTables() {
    document.querySelectorAll('.article table').forEach(table => {
      if (table.parentElement.classList.contains('table-wrap')) return;
      const wrap = document.createElement('div');
      wrap.className = 'table-wrap';
      table.parentNode.insertBefore(wrap, table);
      wrap.appendChild(table);
    });
  }

  // Mobile sidebar
  function toggleSidebar() {
    document.getElementById('sidebar').classList.toggle('open');
    document.getElementById('overlay').classList.toggle('visible');
  }
  function closeSidebar() {
    document.getElementById('sidebar').classList.remove('open');
    document.getElementById('overlay').classList.remove('visible');
  }

  // Init: discover docs, then handle the current route
  discoverDocs().then(() => handleRoute());
</script>
</body>
</html>
