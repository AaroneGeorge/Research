<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Research</title>
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0f0f0f;
      --surface: #1a1a1a;
      --border: #2a2a2a;
      --text: #e0e0e0;
      --text-secondary: #888;
      --accent: #7c9bff;
      --radius: 8px;
    }

    html, body { height: 100%; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Inter', sans-serif;
      background: var(--bg);
      color: var(--text);
      display: flex;
    }

    /* Sidebar */
    .sidebar {
      width: 280px;
      min-width: 280px;
      background: var(--surface);
      border-right: 1px solid var(--border);
      overflow-y: auto;
      padding: 24px 0;
      display: flex;
      flex-direction: column;
    }

    .sidebar-title {
      padding: 0 20px 20px;
      font-size: 1.1rem;
      font-weight: 700;
      color: var(--text);
      border-bottom: 1px solid var(--border);
      margin-bottom: 8px;
    }

    .folder-label {
      padding: 10px 20px 6px;
      font-size: 0.7rem;
      font-weight: 700;
      color: var(--text-secondary);
      letter-spacing: 0.08em;
      text-transform: uppercase;
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: 6px;
      user-select: none;
    }
    .folder-label:hover { color: var(--text); }
    .folder-label .arrow {
      display: inline-block;
      transition: transform 0.15s;
      font-size: 0.6rem;
    }
    .folder.open .arrow { transform: rotate(90deg); }

    .file-list { display: none; padding-bottom: 4px; }
    .folder.open .file-list { display: block; }

    .file-item {
      display: block;
      padding: 8px 20px 8px 32px;
      font-size: 0.82rem;
      color: var(--text-secondary);
      cursor: pointer;
      text-decoration: none;
      border-left: 2px solid transparent;
      transition: all 0.1s;
      line-height: 1.4;
      word-break: break-word;
    }
    .file-item:hover {
      background: rgba(255,255,255,0.04);
      color: var(--text);
    }
    .file-item.active {
      color: var(--accent);
      border-left-color: var(--accent);
      background: rgba(124,155,255,0.08);
    }

    /* Main */
    .main {
      flex: 1;
      overflow-y: auto;
      display: flex;
      justify-content: center;
    }

    /* Empty state */
    .empty-state {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100%;
      color: var(--text-secondary);
      gap: 8px;
      font-size: 0.9rem;
    }

    /* Article content */
    .article {
      display: none;
      width: 100%;
      max-width: 720px;
      padding: 48px 32px 100px;
      line-height: 1.8;
    }

    .article h1 {
      font-size: 1.8rem;
      font-weight: 700;
      margin-bottom: 24px;
      line-height: 1.3;
      color: #fff;
    }
    .article h2 {
      font-size: 1.25rem;
      font-weight: 600;
      margin: 32px 0 12px;
      color: #fff;
    }
    .article h3 {
      font-size: 1.05rem;
      font-weight: 600;
      margin: 24px 0 8px;
      color: var(--text);
    }
    .article h4 {
      font-size: 0.95rem;
      font-weight: 600;
      margin: 20px 0 6px;
      color: var(--text);
    }
    .article p {
      font-size: 0.92rem;
      margin-bottom: 14px;
      color: #bbb;
    }
    .article ul, .article ol {
      margin: 0 0 14px 20px;
    }
    .article li {
      font-size: 0.92rem;
      color: #bbb;
      margin-bottom: 4px;
      line-height: 1.7;
    }
    .article a {
      color: var(--accent);
      text-decoration: none;
    }
    .article a:hover { text-decoration: underline; }
    .article strong { color: var(--text); }
    .article hr {
      border: none;
      border-top: 1px solid var(--border);
      margin: 28px 0;
    }
    .article blockquote {
      border-left: 3px solid var(--accent);
      padding: 10px 16px;
      margin: 16px 0;
      background: rgba(124,155,255,0.05);
      border-radius: 0 var(--radius) var(--radius) 0;
    }
    .article blockquote p { color: var(--text-secondary); margin-bottom: 0; }
    .article code {
      background: #222;
      padding: 2px 6px;
      border-radius: 4px;
      font-size: 0.84em;
      font-family: 'SF Mono', 'Fira Code', monospace;
      color: #e8a56d;
    }
    .article pre {
      background: #161616;
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 16px;
      overflow-x: auto;
      margin: 16px 0;
    }
    .article pre code {
      background: none;
      padding: 0;
      color: var(--text);
      font-size: 0.84em;
    }
    .article table {
      width: 100%;
      border-collapse: collapse;
      margin: 16px 0;
      font-size: 0.85rem;
    }
    .article th {
      background: #1e1e1e;
      border: 1px solid var(--border);
      padding: 8px 12px;
      text-align: left;
      font-weight: 600;
      color: var(--text);
    }
    .article td {
      border: 1px solid var(--border);
      padding: 8px 12px;
      color: #bbb;
    }

    /* Mobile */
    @media (max-width: 700px) {
      body { flex-direction: column; }
      .sidebar {
        width: 100%;
        min-width: unset;
        border-right: none;
        border-bottom: 1px solid var(--border);
        max-height: 40vh;
      }
      .article { padding: 24px 16px 60px; }
    }
  </style>
</head>
<body>

<aside class="sidebar">
  <div class="sidebar-title">Research</div>
  <div id="nav"></div>
</aside>

<main class="main">
  <div class="empty-state" id="empty">
    <span style="font-size:2rem;opacity:0.3">📄</span>
    <span>Select a file to read</span>
  </div>
  <div class="article" id="article"></div>
</main>

<script>
  const folders = {
    "accelerator_projects": [
      { name: "Comprehensive Accelerator Research", path: "accelerator_projects/COMPREHENSIVE_ACCELERATOR_RESEARCH.md" },
      { name: "YC & a16z Speedrun Research", path: "accelerator_projects/YC_and_a16z_Speedrun_Research.md" },
      { name: "Sequoia, Arc & SPC Research", path: "accelerator_projects/sequoia_arc_and_spc_research.md" },
      { name: "Techstars & 500 Global Research", path: "accelerator_projects/techstars_and_500global_research.md" },
      { name: "AngelPad, EF & Antler Research", path: "accelerator_projects/research_angelpad_ef_antler.md" },
      { name: "Seedcamp, SWG, BoostVC, Pioneer", path: "accelerator_projects/accelerator_research_seedcamp_swg_boostvc_pioneer.md" },
      { name: "Finding Startup Ideas Guide", path: "accelerator_projects/finding_startup_ideas_comprehensive_guide.md" },
    ],
    "cancer_vaccine_pipeline": [
      { name: "Research", path: "cancer_vaccine_pipeline/Docs/Research.md" },
      { name: "Feasibility", path: "cancer_vaccine_pipeline/Docs/Feasibility.md" },
    ]
  };

  const nav = document.getElementById('nav');
  let activeItem = null;

  for (const [folder, files] of Object.entries(folders)) {
    const div = document.createElement('div');
    div.className = 'folder open';

    const label = document.createElement('div');
    label.className = 'folder-label';
    label.innerHTML = `<span class="arrow">▶</span> ${folder.replace(/_/g, ' ')}`;
    label.onclick = () => div.classList.toggle('open');

    const list = document.createElement('div');
    list.className = 'file-list';

    files.forEach(f => {
      const item = document.createElement('div');
      item.className = 'file-item';
      item.textContent = f.name;
      item.onclick = () => loadFile(f.path, item);
      list.appendChild(item);
    });

    div.appendChild(label);
    div.appendChild(list);
    nav.appendChild(div);
  }

  async function loadFile(path, el) {
    if (activeItem) activeItem.classList.remove('active');
    activeItem = el;
    el.classList.add('active');

    const article = document.getElementById('article');
    const empty = document.getElementById('empty');

    empty.style.display = 'none';
    article.style.display = 'block';
    article.innerHTML = '<p style="color:var(--text-secondary)">Loading...</p>';

    try {
      const res = await fetch(path);
      if (!res.ok) throw new Error(res.statusText);
      const md = await res.text();
      article.innerHTML = marked.parse(md);
      document.querySelector('.main').scrollTo(0, 0);
    } catch (e) {
      article.innerHTML = `<p style="color:#f87171">Failed to load: ${e.message}</p>`;
    }
  }
</script>
</body>
</html>
